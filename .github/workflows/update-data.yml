name: Sync Sheet Data

on:
  schedule:
    # Every 15 min, 9:00 AM – 11:45 PM IST (IST = UTC+5:30)
    # 9:00 AM IST  = 03:30 UTC
    # 11:45 PM IST = 18:15 UTC
    # Cron runs at :00, :15, :30, :45 of every hour between 03:30–18:15 UTC
    # First run: 03:30 UTC  →  last run: 18:15 UTC
    - cron: '30 3-17 * * 1-5'   # :30 past each hour 03–17 UTC (covers 09:00–23:00 IST)
    - cron: '0,15,45 4-18 * * 1-5'   # :00 :15 :45 of each hour 04–18 UTC
    # Combined this gives ticks at:
    #   03:30, 04:00, 04:15, 04:30, 04:45, 05:00 … 18:00, 18:15  UTC
    #   = 09:00, 09:30, 09:45 … 23:45 IST  (every 15 min Mon–Fri)
  workflow_dispatch:   # manual trigger from GitHub Actions tab OR from site admin panel

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          # Add any other secrets your fetch_data.py needs here
        run: python fetch_data.py

      - name: Commit & push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: sync data.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
